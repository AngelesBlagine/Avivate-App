<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estate Atenti - Analizador</title>
    <style>
        /* Estilos Base enfocados en Dispositivos Móviles */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background-color: #161b22;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ff6a00; /* Identidad visual en tono naranja */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        h1 {
            color: #ff6a00;
            font-size: 24px;
            text-align: center;
            margin-top: 0;
        }
        textarea {
            width: 100%;
            height: 160px;
            background-color: #0d1117;
            color: #fff;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px;
            box-sizing: border-box;
            resize: none;
            font-size: 14px;
        }
        button {
            width: 100%;
            background-color: #ff6a00;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e05d00;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-weight: bold;
        }
        .phishing {
            background-color: #7a1a1a;
            border: 1px solid #ff4545;
            color: #ffcccc;
        }
        .safe {
            background-color: #1a5c2e;
            border: 1px solid #2ea44f;
            color: #ccffdd;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Estate Atenti</h1>
    <p style="text-align: center; font-size: 13px; color: #8b949e;">Analiza la probabilidad de fraude de un correo electrónico con inteligencia artificial</p>
    
    <textarea id="emailText" placeholder="Pega el cuerpo del correo aquí..."></textarea>
    <button onclick="analizarCorreo()">Verificar Contenido</button>
    
    <div id="resultado" class="result-box"></div>
</div>

<script>
    async function analizarCorreo() {
        const textInput = document.getElementById('emailText').value;
        const resultDiv = document.getElementById('resultado');
        
        if (!textInput.trim()) {
            alert("Por favor, ingresa un texto para analizar.");
            return;
        }
        
        resultDiv.style.display = 'none';
        
        try {
            // Petición asíncrona al servidor local de FastAPI
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ text: textInput })
            });
            
            const data = await response.json();
            resultDiv.style.display = 'block';
            const porcentaje = (data.probabilidad * 100).toFixed(2);
            
            if (data.es_phishing) {
                resultDiv.className = "result-box phishing";
                resultDiv.innerHTML = `⚠️ ALERTA DE RIESGO<br>Probabilidad de Phishing: ${porcentaje}%`;
            } else {
                resultDiv.className = "result-box safe";
                resultDiv.innerHTML = `✅ CORREO SEGURO<br>Probabilidad de Phishing: ${porcentaje}%`;
            }
            
        } catch (error) {
            console.error("Error en la conexión:", error);
            alert("Error al conectar con el servidor de IA. Verifica que uvicorn esté en ejecución.");
        }
    }
</script>

</body>
</html>
